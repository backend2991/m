<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaktika Kitoblar Tarmog'i</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Kosmik ranglar palitrasi */
            --deep-space: #020617; /* Juda to'q ko'k */
            --nebula-purple: #6d28d9; /* Binafsha tumanlik */
            --star-gold: #fbbf24; /* Yulduz oltini */
            --starlight: #f1f5f9; /* Yulduz nuri (matn uchun) */
            --glass-bg: rgba(255, 255, 255, 0.03); /* Shisha effekti */
            --glass-border: rgba(255, 255, 255, 0.08); /* Shisha chegarasi */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--starlight);
            
            /* SOKIN KOINOT VA YULDUZLAR FONU */
            background-color: var(--deep-space);
            background-image: 
                /* 1. Yulduzlar qatlami (mayda) */
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px),
                /* 2. Tumanliklar (rangli yog'du) */
                radial-gradient(circle at 20% 20%, rgba(109, 40, 217, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, Blue, 0.15) 0%, transparent 40%);
            background-size: 550px 550px, 350px 350px, 250px 250px, 100% 100%, 100% 100%;
            background-position: 0 0, 40px 60px, 130px 270px, 0 0, 0 0;
            background-attachment: fixed; /* Fon qimirlamaydi */
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* HEADER QISMI */
        .header-section {
            text-align: center;
            margin-bottom: 80px;
        }

        .header-section h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: -3px;
            /* Gradient matn (yulduz nuri effekti) */
            background: linear-gradient(135deg, #fff 0%, var(--star-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }

        /* KOSMIK SEARCH BAR (Shisha effekti) */
        .search-pill {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            background: rgba(255, 255, 255, 0.05); /* Shaffof oq */
            backdrop-filter: blur(20px); /* Orqani xira qilish */
            padding: 8px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: 0.4s;
        }

        .search-pill:focus-within {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 50px rgba(109, 40, 217, 0.2);
            transform: scale(1.02);
        }

        .search-pill input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 28px;
            font-size: 1.15rem;
            font-family: inherit;
            outline: none;
            color: #fff;
        }

        .search-pill input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-pill button {
            background: linear-gradient(135deg, var(--nebula-purple) 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(109, 40, 217, 0.3);
        }

        .search-pill button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(109, 40, 217, 0.5);
        }

        /* KITOB GRIDI */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
        }

        /* SHISHA KOSMIK KARTОCHKA */
        .book-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Glassmorphism */
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 20px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-15px) rotateX(5deg); /* 3D effekt */
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }

        /* Kartochka ustidagi yog'du (hoverda) */
        .book-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0; transition: 0.5s; z-index: 1;
        }

        .book-card:hover::after {
            opacity: 1;
        }

        /* Rasm qutisi */
        .book-img-box {
            width: 100%;
            height: 380px;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 22px;
            border: 1px solid var(--glass-border);
            z-index: 2; /* Yog'dudan tepada */
        }

        .book-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.7s;
        }

        .book-card:hover .book-img-box img {
            transform: scale(1.1) rotate(2deg);
        }

        /* Ma'lumotlar */
        .card-details {
            padding: 0 5px;
            z-index: 2;
        }

        .janr-tag {
            background: rgba(109, 40, 217, 0.2);
            color: #c4b5fd;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 14px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .book-card h3 {
            font-size: 1.5rem;
            margin: 15px 0 8px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        .book-card .author {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 25px;
        }

        /* Narx va Tugma */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 22px;
            margin-top: auto; /* Pastga surish */
        }

        .price-tag {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--star-gold);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        .btn-open {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.6rem;
            transition: 0.4s;
            border: 1px solid var(--glass-border);
        }

        .btn-open:hover {
            background: var(--star-gold);
            color: var(--deep-space);
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
        }

        /* SALE BADGE */
        .sale-badge {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #ef4444;
            color: white;
            padding: 7px 16px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 0.8rem;
            z-index: 10;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-section h1 { font-size: 2.8rem; letter-spacing: -1px; }
            .search-pill { flex-direction: column; border-radius: 20px; padding: 10px; }
            .search-pill button { width: 100%; margin-top: 10px; }
            .book-img-box { height: 320px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="header-section">
            <h1>Galaktika Kitoblari</h1>
            
            <form method="get" class="search-pill">
                <input type="text" name="search" placeholder="Olamni kashf eting (Kitob, muallif...)" value="{{ request.GET.search|default:'' }}">
                <button type="submit">Qidirish</button>
            </form>
        </header>

        <div class="books-grid">
            {% for i in kitoblar %}
            <article class="book-card">
                {% if i.sale > 0 %}
                    <div class="sale-badge">-{{ i.sale }}%</div>
                {% endif %}
                
                <div class="book-img-box">
                    <img src="{{ i.images.first.image.url }}" alt="{{ i.name }}">
                </div>

                <div class="card-details">
                    <span class="janr-tag">{{ i.janr }}</span>
                    <h3>{{ i.name }}</h3>
                    <div class="author">by {{ i.author }}</div>

                    <div class="card-footer">
                        <div class="price-tag">
                            {{ i.price }} <small style="font-size: 0.8rem; color: #fff; font-weight: 400;">so'm</small>
                        </div>
                        <a href="/book/{{ i.id }}/" class="btn-open">→</a>
                    </div>
                </div>
            </article>
            {% endfor %}
        </div>
    </div>

</body>
</html>
